<!DOCTYPE html>
<html>

<head>

    <title>ESP32 Robot IoT Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;

            display: flex;
            justify-content: flex-end;
            /* move container to right */
            align-items: center;

            min-height: 100vh;

            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* GLASS PANEL */

        .mainContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            padding: 40px;
            max-width: 1100px;
            margin-right: 40px;


            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* BULBS */

        .lightContainer {
            display: flex;
            gap: 50px;
        }

        .bulb {
            width: 140px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bulb:hover {
            transform: scale(1.08);
        }

        /* CONTROLLER */

        .controller {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* BUTTON */

        .btn {
            position: absolute;
            border: none;
            background: #cfead5;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn img {
            width: 35px;
        }

        .btn:hover {
            background: #fff6a3;
            transform: scale(1.05);
        }

        .btn.active {
            background: #7fffa0 !important;
            box-shadow: 0 0 10px lime;
        }

        /* POSITIONS */

        .up {
            top: 0;
            left: 105px;
            width: 90px;
            height: 60px;
            border-radius: 100px 100px 0 0;
        }

        .down {
            bottom: 0;
            left: 105px;
            width: 90px;
            height: 60px;
            border-radius: 0 0 100px 100px;
        }

        .left {
            top: 105px;
            left: 0;
            width: 60px;
            height: 90px;
            border-radius: 100px 0 0 100px;
        }

        .right {
            top: 105px;
            right: 0;
            width: 60px;
            height: 90px;
            border-radius: 0 100px 100px 0;
        }

        /* CENTER */

        .center {
            position: absolute;
            top: 90px;
            left: 90px;
            width: 120px;
            height: 120px;
            background: #eeeeee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .center img {
            width: 55px;
        }

        /* DRIFT */

        .driftLeft {
            top: 110px;
            left: -50px;
            background: transparent;
        }

        .driftRight {
            top: 110px;
            right: -50px;
            background: transparent;
        }

        .driftLeft img,
        .driftRight img {
            width: 40px;
        }

        /* SENSOR PANEL */

        .sensorPanel {
            width: 100%;
            margin-top: 20px;
            text-align: center;
        }

        .sensorPanel h2 {
            margin-bottom: 10px;
        }

        /* TABLE */

        .sensorTable {
            margin: auto;
            border-collapse: collapse;
            width: 600px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .sensorTable th,
        .sensorTable td {
            border: 1px solid #ddd;
            padding: 10px;
            font-size: 18px;
        }

        .sensorTable th {
            background: #cfead5;
        }

        .statusIcon {
            width: 35px;
        }

        /* MOBILE */

        @media(max-width:700px) {

            .controller {
                transform: scale(0.8);
            }

            .sensorTable {
                width: 100%;
            }

        }
    </style>
</head>


<body>

    <div class="mainContainer">

        <!-- BULBS -->

        <div class="lightContainer">

            <img src="bulb_off.png" id="bulb1" class="bulb" onclick="toggleLight1()">

            <img src="bulb_off.png" id="bulb2" class="bulb" onclick="toggleLight2()">

        </div>


        <!-- CONTROLLER -->

        <div class="controller">

            <button class="btn up" onclick="directionClick(this,'forward')">
                <img src="up.png">
            </button>

            <button class="btn left" onclick="directionClick(this,'left')">
                <img src="left.png">
            </button>

            <div class="center" onclick="stopRobot()">
                <img src="speaker.png">
            </div>

            <button class="btn right" onclick="directionClick(this,'right')">
                <img src="right.png">
            </button>

            <button class="btn down" onclick="directionClick(this,'backward')">
                <img src="down.png">
            </button>

            <button class="btn driftLeft" onclick="directionClick(this,'driftLeft')">
                <img src="drift_left.png">
            </button>

            <button class="btn driftRight" onclick="directionClick(this,'driftRight')">
                <img src="drift_right.png">
            </button>

        </div>


        <!-- SENSOR TABLE -->

        <div class="sensorPanel">

            <h2>Sensor Monitoring</h2>

            <table class="sensorTable">

                <tr>
                    <th>Sensor</th>
                    <th>Status</th>
                    <th>Value</th>
                </tr>

                <tr>
                    <td>Temperature</td>
                    <td><img id="tempImg" class="statusIcon" src="green.png"></td>
                    <td id="tempValue">--</td>
                </tr>

                <tr>
                    <td>Light</td>
                    <td><img id="lightImg" class="statusIcon" src="green.png"></td>
                    <td id="lightValue">--</td>
                </tr>

                <tr>
                    <td>Gas</td>
                    <td><img id="gasImg" class="statusIcon" src="green.png"></td>
                    <td id="gasValue">--</td>
                </tr>

                <tr>
                    <td>Distance</td>
                    <td><img id="distImg" class="statusIcon" src="green.png"></td>
                    <td id="distValue">--</td>
                </tr>

            </table>

        </div>

    </div>



    <script>

        /* FIREBASE DATABASE */

        const baseUrl = "https://mydbatngi-default-rtdb.firebaseio.com";


        function writeValue(path, value) {

            fetch(`${baseUrl}/${path}.json`, {

                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(value)

            });

        }


        /* ROBOT BUTTON */

        let activeBtn = null;

        function directionClick(button, direction) {

            if (activeBtn) activeBtn.classList.remove("active");

            button.classList.add("active");
            activeBtn = button;

            writeValue("Details/Direction", direction);

        }


        /* STOP */

        function stopRobot() {

            if (activeBtn) {

                activeBtn.classList.remove("active");
                activeBtn = null;

            }

            writeValue("Details/Direction", "stop");

        }


        /* BULBS */

        let light1 = false;
        let light2 = false;

        function toggleLight1() {

            light1 = !light1;

            document.getElementById("bulb1").src =
                light1 ? "bulb_on.png" : "bulb_off.png";

            writeValue("Details/B1S", light1 ? "On" : "Off");

        }

        function toggleLight2() {

            light2 = !light2;

            document.getElementById("bulb2").src =
                light2 ? "bulb_on.png" : "bulb_off.png";

            writeValue("Details/B2S", light2 ? "On" : "Off");

        }


        /* SENSOR UPDATE */

        function updateSensors(data) {

            document.getElementById("tempValue").innerText = data.Temp;
            document.getElementById("lightValue").innerText = data.Light;
            document.getElementById("gasValue").innerText = data.Gas;
            document.getElementById("distValue").innerText = data.Distance;

            /* ALERT COLORS */

            document.getElementById("tempImg").src =
                data.Temp > 30 ? "red.png" : "green.png";

            document.getElementById("gasImg").src =
                data.Gas > 300 ? "red.png" : "green.png";

            document.getElementById("lightImg").src =
                data.Light < 200 ? "red.png" : "green.png";

            document.getElementById("distImg").src =
                data.Distance < 20 ? "red.png" : "green.png";

        }


        /* AUTO REFRESH */

        setInterval(() => {

            fetch(`${baseUrl}/Details.json`)
                .then(res => res.json())
                .then(data => {

                    if (data) updateSensors(data);

                });

        }, 1000);

    </script>

</body>

</html>
